# EasyPlayer build configuration
# Edit this file to change versions or distro targets, then run: python3 build.py

version=1.0.0
pkgrelease=1

ubu0=noble
ubu1=questing
ubu2=resolute

# Runtime dependencies per distro
ubu0-lib=python3, ffmpeg, python3-pyqt6, libmpv2
ubu1-lib=python3, ffmpeg, python3-pyqt6, libmpv2
ubu2-lib=python3, ffmpeg, python3-pyqt6, libmpv2
