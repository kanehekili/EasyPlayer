rootProject.name = "easyplayer"

// ── Release config ────────────────────────────────────────────────────────────
// Edit version / pkgrelease here, then run:  gradle build_all
gradle.ext.version    = "1.1.0"
gradle.ext.pkgrelease = "1"

// ── Target distros ────────────────────────────────────────────────────────────
// Add / remove ubuN entries to change Ubuntu targets.
// "arch" drives the direct-install tarball (install.sh + sources).
gradle.ext.distros = [

    arch: [
        type: "arch",
    ],

    ubu0: [
        type:     "ubuntu",
        codename: "noble",
        libs:     "python3, ffmpeg, python3-pyqt6, libmpv2, python3-numpy, pulseaudio-utils",
    ],

    ubu1: [
        type:     "ubuntu",
        codename: "questing",
        libs:     "python3, ffmpeg, python3-pyqt6, libmpv2, python3-numpy, pulseaudio-utils",
    ],

    ubu2: [
        type:     "ubuntu",
        codename: "resolute",
        libs:     "python3, ffmpeg, python3-pyqt6, libmpv2, python3-numpy, pulseaudio-utils, python3-sounddevice",
    ],

]
